name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege for GITHUB_TOKEN (CodeQL: limit workflow permissions).
permissions:
  contents: read

jobs:
  api-tests:
    name: API (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/api
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: packages/api/package-lock.json
      - run: npm ci
      - run: npx vitest run
